version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: attendance_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: attendance_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d attendance_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: attendance_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://admin:adminpassword@db:5432/attendance_db
      - SECRET_KEY=supersecretkey_change_in_production_please
      - ALGORITHM=HS256
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Mount model files
      - ./backend/yolov8n.pt:/app/yolov8n.pt:ro
    # Uncomment for development
    # volumes:
    #   - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: attendance_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1

  # Development services (uncomment for development)
  # backend-dev:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile.dev
  #   container_name: attendance_backend_dev
  #   ports:
  #     - "8000:8000"
  #   environment:
  #     - DATABASE_URL=postgresql://admin:adminpassword@db:5432/attendance_db
  #     - SECRET_KEY=dev_secret_key
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #   volumes:
  #     - ./backend:/app
  #     - ./backend/yolov8n.pt:/app/yolov8n.pt:ro
  #   command: uvicorn main:app --reload --host 0.0.0.0 --port 8000

  # frontend-dev:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile.dev
  #   container_name: attendance_frontend_dev
  #   ports:
  #     - "5173:5173"
  #   environment:
  #     - VITE_API_URL=http://localhost:8000/api/v1
  #   volumes:
  #     - ./frontend:/app
