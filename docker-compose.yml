version: '3.8'

services:
  # Using Neon PostgreSQL - no local database needed
  # Uncomment below if you want local database for development
  # db:
  #   image: postgres:15-alpine
  #   container_name: attendance_db
  #   restart: always
  #   environment:
  #     POSTGRES_USER: admin
  #     POSTGRES_PASSWORD: adminpassword
  #     POSTGRES_DB: attendance_db
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: attendance_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://neondb_owner:npg_hMtrjxz9qA5C@ep-green-pine-anw2pzja-pooler.c-6.us-east-1.aws.neon.tech/neondb?sslmode=require
      - SECRET_KEY=67aa5288c88bf4499d778514fc114d79e9dfda01dac601cb15cd88f9194e78de
      - ALGORITHM=HS256
    volumes:
      - ./backend/yolov8n.pt:/app/yolov8n.pt:ro
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000/api/v1
    container_name: attendance_frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

  # Development services
  backend-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: attendance_backend_dev
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql://neondb_owner:npg_hMtrjxz9qA5C@ep-green-pine-anw2pzja-pooler.c-6.us-east-1.aws.neon.tech/neondb?sslmode=require
      - SECRET_KEY=67aa5288c88bf4499d778514fc114d79e9dfda01dac601cb15cd88f9194e78de
    volumes:
      - ./backend:/app
      - ./backend/yolov8n.pt:/app/yolov8n.pt:ro
    command: uvicorn main:app --reload --host 0.0.0.0 --port 8000
    profiles:
      - dev

  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: attendance_frontend_dev
    ports:
      - "5174:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    profiles:
      - dev

  # Test services
  backend-test:
    build:
      context: ./backend
      dockerfile: Dockerfile.test
    container_name: attendance_backend_test
    environment:
      - DATABASE_URL=postgresql://neondb_owner:npg_hMtrjxz9qA5C@ep-green-pine-anw2pzja-pooler.c-6.us-east-1.aws.neon.tech/neondb?sslmode=require
      - SECRET_KEY=test-secret-key-for-testing-only
      - ENVIRONMENT=test
    volumes:
      - ./backend:/app
      - ./backend/test-results:/app/htmlcov
    command: pytest -v --cov=app --cov-report=html --cov-report=term
    profiles:
      - test

  frontend-test:
    build:
      context: ./frontend
      dockerfile: Dockerfile.test
    container_name: attendance_frontend_test
    environment:
      - NODE_ENV=test
      - CI=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run test
    profiles:
      - test

